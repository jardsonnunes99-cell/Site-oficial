    <!-- Meta Pixel Code -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];

    <!-- Conversions API & InitiateCheckout Tracking -->
    <script>
      function getCookie(name) {
        let match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        if (match) return match[2];
      }

      function sendServerEvent(eventName) {
        fetch('/api/meta', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            eventName: eventName,
            eventUrl: window.location.href,
            eventTime: Math.floor(Date.now() / 1000),
            fbp: getCookie('_fbp'),
            fbc: getCookie('_fbc')
          })
        }).catch(e => console.error(e));
      }

      // Send Server-Side PageView
      sendServerEvent('PageView');

      // Monitor checkout link clicks
      document.addEventListener('click', function(e) {
        let target = e.target.closest('a');
        if (target && target.href && target.href.includes('checkoutseguro.ru')) {
          if (typeof fbq === 'function') fbq('track', 'InitiateCheckout');
          sendServerEvent('InitiateCheckout');
        }
      });
    </script>
